<!DOCTYPE html>
<html lang="de">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Einstellungen</title>

	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
			background: #f2f3f7;
			padding: 20px;
			color: #333;
		}

		.container {
			max-width: 900px;
			margin: auto;
		}

		.header {
			text-align: center;
			font-size: 32px;
			font-weight: 700;
			margin-bottom: 20px;
		}

		.block {
			background: #fff;
			padding: 20px;
			border-radius: 12px;
			box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
			margin-bottom: 25px;
		}

		.title-row {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 15px;
		}

		.title {
			font-size: 20px;
			font-weight: 700;
			color: #667eea;
		}

		label {
			font-size: 14px;
			color: #555;
			display: block;
			margin-bottom: 5px;
		}

		input,
		select {
			width: 100%;
			padding: 10px;
			border-radius: 8px;
			border: 1px solid #ddd;
			margin-bottom: 12px;
		}

		input::placeholder {
			color: #aaa;
		}

		.button-row {
			display: flex;
			gap: 10px;
		}

		button {
			flex: 1;
			padding: 12px;
			border: none;
			border-radius: 10px;
			color: white;
			font-size: 16px;
			font-weight: 600;
			cursor: pointer;
		}

		.save {
			background: #667eea;
		}

		.save:hover {
			background: #5563c1;
		}

		.danger {
			background: #e74c3c;
		}

		.danger:hover {
			background: #c0392b;
		}

		.switch {
			position: relative;
			width: 46px;
			height: 24px;
			display: inline-block;
		}

		.switch input {
			display: none;
		}

		.slider {
			position: absolute;
			inset: 0;
			background: #ccc;
			border-radius: 24px;
			transition: .3s;
			cursor: pointer;
		}

		.slider:before {
			content: "";
			position: absolute;
			height: 18px;
			width: 18px;
			left: 3px;
			bottom: 3px;
			background: white;
			border-radius: 50%;
			transition: .3s;
		}

		input:checked+.slider {
			background: #667eea;
		}

		input:checked+.slider:before {
			transform: translateX(22px);
		}

		.danger-block {
			border: 2px solid #e74c3c;
			background: #fff5f5;
		}

		.overlay {
			position: fixed;
			inset: 0;
			background: rgba(0, 0, 0, 0.4);
			display: none;
			align-items: center;
			justify-content: center;
			z-index: 999;
		}

		.popup {
			background: #fff;
			padding: 20px;
			border-radius: 12px;
			font-weight: 600;
		}

		.hidden {
			display: none;
		}
	</style>

</head>

<body>

	<div class="overlay" id="overlay">
		<div class="popup" id="overlayText">Bitte warten...</div>
	</div>

	<div class="container">

		<div class="header">⚙️ Einstellungen</div>

		<form id="settingsForm">

			<!-- PUSH API -->
			<div class="block">
				<div class="title-row">
					<div class="title">Push API</div>
					<label class="switch">
						<input type="checkbox" id="push_enabled">
						<span class="slider"></span>
					</label>
				</div>

				<div id="push_box">
					<label>Host</label>
					<input id="push_host" placeholder="z.B. http://www.example.com">

					<label>Smartmeter Endpoint</label>
					<input id="push_path_smartmeter" placeholder="z.B. /upload/smartmeter">

					<label>System Endpoint</label>
					<input id="push_path_system" placeholder="z.B. /upload/system">

					<label>Datensätze pro Übertragung</label>
					<input type="number" id="push_batch_size" min="1" placeholder="z.B. 6 für Übertragung alle 30min">

					<div class="title-row" style="margin-top:10px;">
						<label style="margin:0;">
							WLAN zwischen Übertragungen deaktivieren
						</label>

						<label class="switch">
							<input type="checkbox" id="push_disable_wifi">
							<span class="slider"></span>
						</label>
					</div>

				</div>
			</div>

			<!-- WLAN -->
			<div class="block">
				<div class="title">WLAN</div>

				<label>SSID</label>
				<input id="wifi_ssid">

				<label>Passwort</label>
				<input type="password" id="wifi_password">

				<label>Modus</label>
				<select id="wifi_mode">
					<option value="dhcp">DHCP</option>
					<option value="static">Statisch</option>
				</select>

				<div id="wifi_dhcp" class="hidden">
					<label>Gerätename</label>
					<input id="wifi_hostname">
				</div>

				<div id="wifi_static" class="hidden">
					<label>IP</label>
					<input id="wifi_ip">

					<label>Subnet</label>
					<input id="wifi_subnet">

					<label>Gateway</label>
					<input id="wifi_gateway">

					<label>DNS 1</label>
					<input id="wifi_dns_1">

					<label>DNS 2</label>
					<input id="wifi_dns_2">
				</div>
			</div>

			<!-- SYSTEM -->
			<div class="block">
				<div class="title">System</div>

				<label>NTP Server 1</label>
				<input id="ntp_1" placeholder="z.B. pool.ntp.org">

				<label>NTP Server 2</label>
				<input id="ntp_2">

				<label>NTP Server 3</label>
				<input id="ntp_3">

				<label>Zeitzone (GMT Offset)</label>
				<select id="timezone">
					<option value="-43200">UTC−12</option>
					<option value="-39600">UTC−11</option>
					<option value="-36000">UTC−10</option>
					<option value="-32400">UTC−9</option>
					<option value="-28800">UTC−8</option>
					<option value="-25200">UTC−7</option>
					<option value="-21600">UTC−6</option>
					<option value="-18000">UTC−5</option>
					<option value="-14400">UTC−4</option>
					<option value="-10800">UTC−3</option>
					<option value="-7200">UTC−2</option>
					<option value="-3600">UTC−1</option>
					<option value="0">UTC±0</option>
					<option value="3600">UTC+1</option>
					<option value="7200">UTC+2</option>
					<option value="10800">UTC+3</option>
					<option value="14400">UTC+4</option>
					<option value="18000">UTC+5</option>
					<option value="21600">UTC+6</option>
					<option value="25200">UTC+7</option>
					<option value="28800">UTC+8</option>
					<option value="32400">UTC+9</option>
					<option value="36000">UTC+10</option>
					<option value="39600">UTC+11</option>
					<option value="43200">UTC+12</option>
					<option value="46800">UTC+13</option>
					<option value="50400">UTC+14</option>
				</select>

				<label>Sommerzeit (DST Offset)</label>
				<select id="timezone_dst">
					<option value="0">Keine DST</option>
					<option value="1800">+30 Minuten</option>
					<option value="3600">+1 Stunde</option>
					<option value="7200">+2 Stunden</option>
				</select>
			</div>

			<!-- SAVE -->
			<div class="block">
				<div class="button-row">
					<button type="submit" class="save">Speichern</button>
				</div>
			</div>

			<!-- GEFAHR -->
			<div class="block danger-block">
				<div class="title" style="color:#e74c3c;">☢️ GEFAHR</div>
				<button type="button" class="danger" onclick="factoryReset()">
					Werkseinstellungen
				</button>
			</div>

		</form>

	</div>

	<script>
		function showOverlay(t) {
			document.getElementById('overlayText').textContent = t;
			document.getElementById('overlay').style.display = 'flex';
		}

		function hideOverlay() {
			document.getElementById('overlay').style.display = 'none';
		}

		function updateUI() {
			document.getElementById('push_box').classList.toggle(
				'hidden',
				!document.getElementById('push_enabled').checked
			);

			const isDhcp = document.getElementById('wifi_mode').value === 'dhcp';
			document.getElementById('wifi_dhcp').classList.toggle('hidden', !isDhcp);
			document.getElementById('wifi_static').classList.toggle('hidden', isDhcp);
		}

		document.getElementById('push_enabled').addEventListener('change', updateUI);
		document.getElementById('wifi_mode').addEventListener('change', updateUI);

		// LOAD
		async function load() {
			showOverlay("Laden...");

			try {
				const r = await fetch('/api/settings');
				const d = await r.json();

				// PUSH API
				document.getElementById('push_enabled').checked = d.push_api.enable ?? false;
				document.getElementById('push_host').value = d.push_api.server_host || "";
				document.getElementById('push_path_smartmeter').value = d.push_api.server_path_smartmeter || "";
				document.getElementById('push_path_system').value = d.push_api.server_path_system || "";
				document.getElementById('push_batch_size').value = d.push_api.batch_size ?? 1;
				document.getElementById('push_disable_wifi').checked = d.push_api.disable_wifi ?? false;

				// NETWORK
				document.getElementById('wifi_ssid').value = d.network.ssid || "";
				document.getElementById('wifi_password').value = d.network.password || "";
				document.getElementById('wifi_mode').value = d.network.mode || "dhcp";
				document.getElementById('wifi_hostname').value = d.network.hostname || "";

				document.getElementById('wifi_ip').value = d.network.ip || "";
				document.getElementById('wifi_subnet').value = d.network.subnet || "";
				document.getElementById('wifi_gateway').value = d.network.gateway || "";
				document.getElementById('wifi_dns_1').value = d.network.dns_1 || "";
				document.getElementById('wifi_dns_2').value = d.network.dns_2 || "";

				// SYSTEM
				document.getElementById('ntp_1').value = d.system.ntp_1 || "";
				document.getElementById('ntp_2').value = d.system.ntp_2 || "";
				document.getElementById('ntp_3').value = d.system.ntp_3 || "";

				document.getElementById('timezone').value = d.system.timezone_offset_gmt ?? "0";
				document.getElementById('timezone_dst').value = d.system.timezone_offset_dst ?? "0";

			} catch (e) {
				alert("Fehler beim Laden");
			}

			hideOverlay();
			updateUI();
		}

		// SAVE
		document.getElementById('settingsForm').addEventListener('submit', async e => {
			e.preventDefault();

			showOverlay("Speichern...");

			const data = {
				network: {
					ssid: document.getElementById('wifi_ssid').value,
					password: document.getElementById('wifi_password').value,
					mode: document.getElementById('wifi_mode').value,
					hostname: document.getElementById('wifi_hostname').value,
					ip: document.getElementById('wifi_ip').value,
					subnet: document.getElementById('wifi_subnet').value,
					gateway: document.getElementById('wifi_gateway').value,
					dns_1: document.getElementById('wifi_dns_1').value,
					dns_2: document.getElementById('wifi_dns_2').value
				},

				system: {
					ntp_1: document.getElementById('ntp_1').value,
					ntp_2: document.getElementById('ntp_2').value,
					ntp_3: document.getElementById('ntp_3').value,
					timezone_offset_gmt: parseInt(document.getElementById('timezone').value, 10),
					timezone_offset_dst: parseInt(document.getElementById('timezone_dst').value, 10)
				},

				push_api: {
					enable: document.getElementById('push_enabled').checked,
					server_host: document.getElementById('push_host').value,
					server_path_smartmeter: document.getElementById('push_path_smartmeter').value,
					server_path_system: document.getElementById('push_path_system').value,
					batch_size: parseInt(document.getElementById('push_batch_size').value, 10),
					disable_wifi: document.getElementById('push_disable_wifi').checked
				}
			};

			try {
				const r = await fetch('/api/settings', {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify(data)
				});

				hideOverlay();

				if (!r.ok)
					throw new Error(await r.text());

				alert("Gespeichert ✅");

			} catch (err) {
				hideOverlay();
				alert("Fehler beim Speichern ❌\n" + err.message);
			}
		});

		// RESET
		async function factoryReset() {
			if (!confirm("Werkseinstellungen wirklich laden?"))
				return;

			showOverlay("Reset...");

			try {
				await fetch('/api/settings', {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify({ factory_reset: true })
				});
			} catch (e) {
				// ignore
			}

			location.reload();
		}

		document.addEventListener('DOMContentLoaded', load);

	</script>

</body>

</html>
