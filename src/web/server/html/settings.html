<!DOCTYPE html>
<html lang="de">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Einstellungen</title>

	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
			background: #f2f3f7;
			padding: 20px;
			color: #333;
		}

		.container {
			max-width: 900px;
			margin: auto;
		}

		.header {
			text-align: center;
			font-size: 32px;
			font-weight: 700;
			margin-bottom: 20px;
		}

		.block {
			background: #fff;
			padding: 20px;
			border-radius: 12px;
			box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
			margin-bottom: 25px;
		}

		.title-row {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 15px;
		}

		.title {
			font-size: 20px;
			font-weight: 700;
			color: #667eea;
		}

		label {
			font-size: 14px;
			color: #555;
			display: block;
			margin-bottom: 5px;
		}

		input,
		select {
			width: 100%;
			padding: 10px;
			border-radius: 8px;
			border: 1px solid #ddd;
			margin-bottom: 12px;
		}

		input::placeholder {
			color: #aaa;
		}

		/* BUTTONS */
		.button-row {
			display: flex;
			gap: 10px;
		}

		button {
			flex: 1;
			padding: 12px;
			border: none;
			border-radius: 10px;
			color: white;
			font-size: 16px;
			font-weight: 600;
			cursor: pointer;
		}

		.save {
			background: #667eea;
		}

		.save:hover {
			background: #5563c1;
		}

		.danger {
			background: #e74c3c;
		}

		.danger:hover {
			background: #c0392b;
		}

		/* SWITCH */
		.switch {
			position: relative;
			width: 46px;
			height: 24px;
			display: inline-block;
		}

		.switch input {
			display: none;
		}

		.slider {
			position: absolute;
			inset: 0;
			background: #ccc;
			border-radius: 24px;
			transition: .3s;
			cursor: pointer;
		}

		.slider:before {
			content: "";
			position: absolute;
			height: 18px;
			width: 18px;
			left: 3px;
			bottom: 3px;
			background: white;
			border-radius: 50%;
			transition: .3s;
		}

		input:checked+.slider {
			background: #667eea;
		}

		input:checked+.slider:before {
			transform: translateX(22px);
		}

		/* GEFAHR */
		.danger-block {
			border: 2px solid #e74c3c;
			background: #fff5f5;
		}

		/* OVERLAY */
		.overlay {
			position: fixed;
			inset: 0;
			background: rgba(0, 0, 0, 0.4);
			display: none;
			align-items: center;
			justify-content: center;
			z-index: 999;
		}

		.popup {
			background: #fff;
			padding: 20px;
			border-radius: 12px;
			font-weight: 600;
		}

		.hidden {
			display: none;
		}
	</style>

</head>

<body>

	<div class="overlay" id="overlay">
		<div class="popup" id="overlayText">Bitte warten...</div>
	</div>

	<div class="container">

		<div class="header">⚙️ Einstellungen</div>

		<form id="settingsForm">

			<!-- PUSH -->
			<div class="block">

				<div class="title-row">
					<div class="title">Push API</div>

					<label class="switch">
						<input type="checkbox" id="push_enabled">
						<span class="slider"></span>
					</label>
				</div>

				<div id="push_box">

					<label>Host</label>
					<input id="push_host" placeholder="http://www.example.com">

					<label>Smartmeter Endpoint</label>
					<input id="push_path_smartmeter" placeholder="/upload/smartmeter">

					<label>System Endpoint</label>
					<input id="push_path_system" placeholder="/upload/system">

				</div>
			</div>

			<!-- WLAN -->
			<div class="block">

				<div class="title">WLAN</div>

				<label>SSID</label>
				<input id="wifi_ssid">

				<label>Passwort</label>
				<input type="password" id="wifi_password">

				<label>Modus</label>
				<select id="wifi_mode">
					<option value="dhcp">DHCP</option>
					<option value="static">Statisch</option>
				</select>

				<div id="wifi_static" class="hidden">

					<label>IP</label>
					<input id="wifi_ip">

					<label>Subnet</label>
					<input id="wifi_subnet">

					<label>Gateway</label>
					<input id="wifi_gateway">

				</div>
			</div>

			<!-- SYSTEM -->
			<div class="block">

				<div class="title">System</div>

				<label>Gerätename</label>
				<input id="device_name">

				<label>NTP Server</label>
				<input id="ntp_server" placeholder="pool.ntp.org">

				<label>Zeitzone</label>
				<select id="timezone">
					<option value="UTC+0" selected>London (UTC+0)</option>
					<option value="UTC+1">Berlin (UTC+1)</option>
					<option value="UTC+9">Tokio (UTC+9)</option>
				</select>

			</div>

			<!-- SAVE -->
			<div class="block">
				<div class="button-row">
					<button type="submit" class="save">Speichern</button>
				</div>
			</div>

			<!-- GEFAHR -->
			<div class="block danger-block">

				<div class="title" style="color:#e74c3c;">☢️ GEFAHR</div>

				<button type="button" class="danger" onclick="factoryReset()">
					Werkseinstellungen
				</button>

			</div>

		</form>

	</div>

	<script>

		function showOverlay(t) {
			document.getElementById('overlayText').textContent = t;
			document.getElementById('overlay').style.display = 'flex';
		}

		function hideOverlay() {
			document.getElementById('overlay').style.display = 'none';
		}

		function updateUI() {

			document.getElementById('push_box').classList.toggle(
				'hidden',
				!document.getElementById('push_enabled').checked
			);

			document.getElementById('wifi_static').classList.toggle(
				'hidden',
				document.getElementById('wifi_mode').value !== 'static'
			);
		}

		document.getElementById('push_enabled').addEventListener('change', updateUI);
		document.getElementById('wifi_mode').addEventListener('change', updateUI);

		/* LOAD */
		async function load() {

			showOverlay("Laden...");

			try {
				const r = await fetch('/api/settings');
				const d = await r.json();

				for (const k in d) {
					const el = document.getElementById(k);
					if (!el) continue;

					if (el.type === 'checkbox') el.checked = d[k];
					else el.value = d[k];
				}

			} catch (e) {
				alert("Fehler beim Laden");
			}

			hideOverlay();
			updateUI();
		}

		/* SAVE */
		document.getElementById('settingsForm').addEventListener('submit', async e => {
			e.preventDefault();

			showOverlay("Speichern...");

			const data = {
				push_enabled: document.getElementById('push_enabled').checked,
				push_host: document.getElementById('push_host').value,
				push_path_smartmeter: document.getElementById('push_path_smartmeter').value,
				push_path_system: document.getElementById('push_path_system').value,

				wifi_ssid: document.getElementById('wifi_ssid').value,
				wifi_password: document.getElementById('wifi_password').value,
				wifi_mode: document.getElementById('wifi_mode').value,
				wifi_ip: document.getElementById('wifi_ip').value,
				wifi_subnet: document.getElementById('wifi_subnet').value,
				wifi_gateway: document.getElementById('wifi_gateway').value,

				device_name: document.getElementById('device_name').value,
				ntp_server: document.getElementById('ntp_server').value,
				timezone: document.getElementById('timezone').value
			};

			try {
				const r = await fetch('/api/settings', {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify(data)
				});

				hideOverlay();

				if (!r.ok) throw new Error(await r.text());

				alert("Gespeichert ✅");

			} catch (err) {
				hideOverlay();
				alert("Fehler beim Speichern ❌\n" + err.message);
			}
		});

		/* RESET */
		async function factoryReset() {

			if (!confirm("Werkseinstellungen wirklich laden?")) return;

			showOverlay("Reset...");

			await fetch('/api/settings', {
				method: 'POST',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify({ factory_reset: true })
			});

			location.reload();
		}

		document.addEventListener('DOMContentLoaded', load);

	</script>

</body>

</html>
